<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>Student Management</h1>
        <div class="nav-links">
            <a th:href="@{/}" class="btn small-btn">Home</a>
            <a th:href="@{/students/new}" class="btn small-btn">Add Student</a>
            <a th:href="@{/courses}" class="btn small-btn secondary-btn">Courses</a>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Student Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.studentName}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.phone}"></td>
                <td th:text="${student.department}"></td>
                <td th:text="${student.course.courseName + ' (' + student.course.courseCode + ')'}"></td>
                <td>
                    <a th:href="@{/students/edit/{id}(id=${student.id})}" class="action-link edit-link">Edit</a>
                    <a th:href="@{/students/delete/{id}(id=${student.id})}" class="action-link delete-link"
                       onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="7" class="empty-text">No students found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
