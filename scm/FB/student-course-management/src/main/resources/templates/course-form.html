<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Course Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="form-card">
        <h1 th:text="${pageTitle}"></h1>

        <form th:action="@{/courses/save}" th:object="${course}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="courseName">Course Name</label>
                <input type="text" id="courseName" th:field="*{courseName}" placeholder="Enter course name" required>
            </div>

            <div class="form-group">
                <label for="courseCode">Course Code</label>
                <input type="text" id="courseCode" th:field="*{courseCode}" placeholder="Enter course code" required>
            </div>

            <div class="form-group">
                <label for="instructorName">Instructor Name</label>
                <input type="text" id="instructorName" th:field="*{instructorName}" placeholder="Enter instructor name" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">Save Course</button>
                <a th:href="@{/courses}" class="btn secondary-btn">Back</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
