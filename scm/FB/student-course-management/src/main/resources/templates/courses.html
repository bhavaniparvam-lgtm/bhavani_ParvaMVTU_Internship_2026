<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>Course Management</h1>
        <div class="nav-links">
            <a th:href="@{/}" class="btn small-btn">Home</a>
            <a th:href="@{/courses/new}" class="btn small-btn">Add Course</a>
            <a th:href="@{/students}" class="btn small-btn secondary-btn">Students</a>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Course Code</th>
                <th>Instructor Name</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}"></td>
                <td th:text="${course.courseName}"></td>
                <td th:text="${course.courseCode}"></td>
                <td th:text="${course.instructorName}"></td>
                <td>
                    <a th:href="@{/courses/edit/{id}(id=${course.id})}" class="action-link edit-link">Edit</a>
                    <a th:href="@{/courses/delete/{id}(id=${course.id})}" class="action-link delete-link"
                       onclick="return confirm('Are you sure you want to delete this course?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(courses)}">
                <td colspan="5" class="empty-text">No courses found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
