<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h2 class="page-title mb-1">Product List</h2>
            <p class="page-subtitle mb-0">Manage product records and stock quantity.</p>
        </div>
        <a th:href="@{/products/new}" class="btn btn-primary custom-btn">Add Product</a>
    </div>

    <div class="custom-card">
        <div class="custom-card-body">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product, stat : ${products}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${product.productName}"></td>
                        <td th:text="${product.category}"></td>
                        <td th:text="${product.price}"></td>
                        <td th:text="${product.stockQuantity}"></td>
                        <td>
                            <span th:if="${product.stockQuantity > 0}" class="status-pill success-pill">Available</span>
                            <span th:if="${product.stockQuantity <= 0}" class="status-pill danger-pill">Out of Stock</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/products/edit/{id}(id=${product.productId})}" class="btn btn-sm btn-warning action-btn">Edit</a>
                            <a th:href="@{/products/delete/{id}(id=${product.productId})}"
                               class="btn btn-sm btn-danger action-btn"
                               onclick="return confirm('Delete this product?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="7" class="text-center text-muted py-4">No products found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
