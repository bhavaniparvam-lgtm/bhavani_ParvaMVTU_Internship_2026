<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="form-wrapper">
        <div class="form-card">
            <div class="form-card-header">
                <h2 class="page-title mb-1" th:text="${pageTitle}"></h2>
                <p class="page-subtitle mb-0">Add product details and maintain stock properly.</p>
            </div>

            <form th:action="@{/products/save}" th:object="${product}" method="post" class="p-4">
                <input type="hidden" th:field="*{productId}">

                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" th:field="*{productName}" class="form-control custom-input">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input type="text" th:field="*{category}" class="form-control custom-input">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control custom-input">
                </div>

                <div class="mb-4">
                    <label class="form-label">Stock Quantity</label>
                    <input type="number" th:field="*{stockQuantity}" class="form-control custom-input">
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-success custom-btn">Save</button>
                    <a th:href="@{/products}" class="btn btn-secondary custom-btn secondary-btn">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
