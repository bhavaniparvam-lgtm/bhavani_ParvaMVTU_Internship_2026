<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="custom-card">
        <div class="custom-card-header">
            Order Details
        </div>
        <div class="custom-card-body">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="detail-box">
                        <div class="detail-label">Order ID</div>
                        <div class="detail-value" th:text="${order.orderId}"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="detail-box">
                        <div class="detail-label">Customer Name</div>
                        <div class="detail-value" th:text="${order.customer.name}"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="detail-box">
                        <div class="detail-label">Order Date</div>
                        <div class="detail-value" th:text="${order.orderDate}"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="detail-box">
                        <div class="detail-label">Status</div>
                        <div class="detail-value">
                            <span class="status-pill info-pill" th:text="${order.status}"></span>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="detail-box">
                        <div class="detail-label">Total Amount</div>
                        <div class="detail-value" th:text="${order.totalAmount}"></div>
                    </div>
                </div>
            </div>

            <h5 class="section-title">Ordered Products</h5>

            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Subtotal</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item, stat : ${order.orderItems}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${item.product.productName}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.unitPrice}"></td>
                        <td th:text="${item.subTotal}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4">
                <a th:href="@{/orders}" class="btn btn-secondary custom-btn secondary-btn">Back</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
