<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="form-wrapper">
        <div class="form-card">
            <div class="form-card-header">
                <h2 class="page-title mb-1">Create Order</h2>
                <p class="page-subtitle mb-0">Select customer, product, quantity, and order status.</p>
            </div>

            <form th:action="@{/orders/save}" th:object="${orderForm}" method="post" class="p-4">
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <div class="mb-3">
                    <label class="form-label">Select Customer</label>
                    <select th:field="*{customerId}" class="form-select custom-input" required>
                        <option value="">-- Select Customer --</option>
                        <option th:each="customer : ${customers}"
                                th:value="${customer.customerId}"
                                th:text="${customer.name}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Product</label>
                    <select th:field="*{productId}" class="form-select custom-input" required>
                        <option value="">-- Select Product --</option>
                        <option th:each="product : ${products}"
                                th:value="${product.productId}"
                                th:text="${product.productName + ' | Stock: ' + product.stockQuantity}"
                                th:disabled="${product.stockQuantity <= 0}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" th:field="*{quantity}" class="form-control custom-input" min="1" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Order Status</label>
                    <select th:field="*{status}" class="form-select custom-input">
                        <option value="PLACED">PLACED</option>
                        <option value="SHIPPED">SHIPPED</option>
                        <option value="DELIVERED">DELIVERED</option>
                    </select>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-success custom-btn">Save Order</button>
                    <a th:href="@{/orders}" class="btn btn-secondary custom-btn secondary-btn">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
