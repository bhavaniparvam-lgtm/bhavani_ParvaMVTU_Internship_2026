<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h2 class="page-title mb-1">Order List</h2>
            <p class="page-subtitle mb-0">Track customer orders and totals.</p>
        </div>
        <a th:href="@{/orders/new}" class="btn btn-primary custom-btn">Create Order</a>
    </div>

    <div class="custom-card">
        <div class="custom-card-body">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Total Amount</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order, stat : ${orders}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${order.orderId}"></td>
                        <td th:text="${order.customer.name}"></td>
                        <td th:text="${order.orderDate}"></td>
                        <td><span class="status-pill info-pill" th:text="${order.status}"></span></td>
                        <td th:text="${order.totalAmount}"></td>
                        <td class="text-center">
                            <a th:href="@{/orders/view/{id}(id=${order.orderId})}" class="btn btn-sm btn-info text-white action-btn">View</a>
                            <a th:href="@{/orders/delete/{id}(id=${order.orderId})}"
                               class="btn btn-sm btn-danger action-btn"
                               onclick="return confirm('Delete this order?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="7" class="text-center text-muted py-4">No orders found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
