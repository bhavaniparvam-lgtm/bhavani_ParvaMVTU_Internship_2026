<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="form-wrapper">
        <div class="form-card">
            <div class="form-card-header">
                <h2 class="page-title mb-1" th:text="${pageTitle}"></h2>
                <p class="page-subtitle mb-0">Enter customer details carefully.</p>
            </div>

            <form th:action="@{/customers/save}" th:object="${customer}" method="post" class="p-4">
                <input type="hidden" th:field="*{customerId}">

                <div class="mb-3">
                    <label class="form-label">Customer Name</label>
                    <input type="text" th:field="*{name}" class="form-control custom-input">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control custom-input">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control custom-input">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Address</label>
                    <textarea th:field="*{address}" class="form-control custom-input" rows="3"></textarea>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-success custom-btn">Save</button>
                    <a th:href="@{/customers}" class="btn btn-secondary custom-btn secondary-btn">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
