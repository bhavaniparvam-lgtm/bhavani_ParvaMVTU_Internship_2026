<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="page-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h2 class="page-title mb-1">Customer List</h2>
            <p class="page-subtitle mb-0">Add, edit, and manage customer records.</p>
        </div>
        <a th:href="@{/customers/new}" class="btn btn-primary custom-btn">Add Customer</a>
    </div>

    <div class="custom-card">
        <div class="custom-card-body">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="customer, stat : ${customers}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${customer.name}"></td>
                        <td th:text="${customer.email}"></td>
                        <td th:text="${customer.phone}"></td>
                        <td th:text="${customer.address}"></td>
                        <td class="text-center">
                            <a th:href="@{/customers/edit/{id}(id=${customer.customerId})}" class="btn btn-sm btn-warning action-btn">Edit</a>
                            <a th:href="@{/customers/delete/{id}(id=${customer.customerId})}"
                               class="btn btn-sm btn-danger action-btn"
                               onclick="return confirm('Delete this customer?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="6" class="text-center text-muted py-4">No customers found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
