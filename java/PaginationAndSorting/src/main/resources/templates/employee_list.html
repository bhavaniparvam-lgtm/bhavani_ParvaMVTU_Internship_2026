<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Directory</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .sort-link{
            color: inherit;
            text-decoration:none;
        }

        .sort-link:hover{
            text-decoration:underline;
        }

        th.active{
            background-color:#198754 !important;
            color:white;
        }
    </style>
</head>

<body class="bg-light">

<div class="container py-4">

    <h2 class="mb-1">Employee Directory</h2>

    <p class="text-muted">
        Showing page
        <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
        (
        <span th:text="${totalItems}"></span>
        total records)
    </p>

    <!-- Records Per Page -->
    <form method="get" action="/employees" class="d-inline">
        <input type="hidden" name="sort" th:value="${sortField}">
        <input type="hidden" name="dir" th:value="${sortDir}">
        <input type="hidden" name="page" value="0">

        Records per page:

        <select name="size"
                onchange="this.form.submit()"
                class="form-select-sm">

            <option th:each="s : ${ {5,10,20,50} }"
			        th:value="${s}"
			        th:text="${s}"
			        th:selected="${s == pageSize}">
			</option>

        </select>
    </form>

    <!-- Employee Table -->
    <table class="table table-striped table-bordered table-hover mt-3">

        <thead class="table-dark">
        <tr>

            <!-- ID Sorting -->
            <th th:classappend="${sortField=='id' ? 'active' : ''}">
                <a class="sort-link"
                   th:href="@{/employees(
                   page=0,
                   size=${pageSize},
                   sort='id',
                   dir=${sortField=='id' ? reverseSortDir : 'asc'}
                   )}">
                    ID
                    <span th:text="${sortField=='id'
                           ? (sortDir=='asc' ? '▲':'▼')
                           : '⇅'}"></span>
                </a>
            </th>

            <!-- Name Sorting -->
            <th th:classappend="${sortField=='name' ? 'active' : ''}">
                <a class="sort-link"
                   th:href="@{/employees(
                   page=0,
                   size=${pageSize},
                   sort='name',
                   dir=${sortField=='name' ? reverseSortDir : 'asc'}
                   )}">
                    Name
                    <span th:text="${sortField=='name'
                           ? (sortDir=='asc' ? '▲':'▼')
                           : '⇅'}"></span>
                </a>
            </th>

            <th>Email</th>

            <!-- Salary Sorting -->
            <th th:classappend="${sortField=='salary' ? 'active' : ''}">
                <a class="sort-link"
                   th:href="@{/employees(
                   page=0,
                   size=${pageSize},
                   sort='salary',
                   dir=${sortField=='salary' ? reverseSortDir : 'asc'}
                   )}">
                    Salary
                    <span th:text="${sortField=='salary'
                           ? (sortDir=='asc' ? '▲':'▼')
                           : '⇅'}"></span>
                </a>
            </th>

            <th>Department</th>

        </tr>
        </thead>


        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>

            <td th:text="${'$' +
               #numbers.formatDecimal(emp.salary,1,'COMMA',0,'POINT')}">
            </td>

            <td th:text="${emp.department}"></td>
        </tr>
        </tbody>

    </table>


    <!-- Pagination -->
