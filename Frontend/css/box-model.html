<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 200px;
        height: 100px;
        background-color: lightblue;
        border: 2px solid black;
        padding: 20px;
        margin: 20px;
        /* margin will apply space at the outer edges of the element */
        /* padding will apply space at the inner edges of the element */
      }
    </style>
  </head>
  <body>
    <div class="box">This is a box</div>
  </body>
</html>
