<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .outer-box {
        width: 200px;
        height: 200px;
        background-color: lightblue;
        transform: scale(1.2) translateX(200px);
        border: 5px solid black;
        margin: auto;
        background-color: lightcoral;
        /* position: relative; */
      }
      .inner-box:hover {
        background-color: lightgrey;
        transform: scale(1.5) translateY(100px) rotate(30deg);
        /* Move the inner box up on hover */
        color: black;
        border-radius: 50%;
        font-size: 50px;
        transition-delay: 1ms;
      }
      .inner-box {
        width: 100px;
        height: 100px;
        background-color: lightcoral;
        position: absolute;
        top: 50px;
        left: 50px;
        /* transition: transform 5s; */
        transition-property: transform background-color;
        transition-duration: 5s;
        /* Transition for smooth animation */
        transition-timing-function: ease-in-out;
        transition-delay: 0s;
        /* transition:
          transform 5s ease-in-out 0s,
          background-color 5s ease-in-out 0s; */
        /* transwition-property, transition-duration, transition-timing-function transition-delay */
      }
    </style>
  </head>
  <body>
    <div class="outer-box">
      <div class="inner-box">BOX</div>
    </div>
  </body>
</html>
