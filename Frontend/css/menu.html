<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        display: flex;
        background-color: #333;
        justify-content: start;
      }
      a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        justify-content: start;
      }
      nav ul li {
        display: inline;
      }
      a:hover {
        background-color: #111;
      }
      img {
        margin-right: auto;
        height: 50px;
        width: 50px;
        justify-content: start;
        /* align-items: end;
        text-align: end; */
        flex-grow: 2;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <!-- # refers to no link -->
          <img src="../html/v/image.png" alt="mic" />
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
  </body>
</html>
