<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        display: grid;
        grid-template-columns: repeat(4, 150px);
        /* repeat(count, size) */
        grid-template-rows: repeat(4, 250px);
        /* grid-column-gap: 20px;
        grid-row-gap: 10px; */
        /* gap: 10px; */
        /* grid-gap: 20px 10px; */
        /* row-gap column-gap */
        grid-gap: 10px;
        /* for both same */
        /* for placing the items alignment we use justify-items and align-items */
        justify-items: center;
        /* start center end */
        align-items: center;
        /* start center end */
        justify-content: center;
        /* start center end space-around space-between */
        align-content: center;
        /* start center end space-around space-between */
      }
      .child1,
      .child2,
      .child3,
      .child4,
      .child5,
      .child6,
      .child7,
      .child8,
      .child9,
      .child10 {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        border: 1px solid black;
        padding: 20px;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <!-- div.child${child$}*10 -->
      <div class="child1">child1</div>
      <div class="child2">child2</div>
      <div class="child3">child3</div>
      <div class="child4">child4</div>
      <div class="child5">child5</div>
      <div class="child6">child6</div>
      <div class="child7">child7</div>
      <div class="child8">child8</div>
      <div class="child9">child9</div>
      <div class="child10">child10</div>
    </div>
  </body>
</html>
