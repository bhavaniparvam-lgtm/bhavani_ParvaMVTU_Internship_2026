<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .outer-box {
        display: grid;
        grid-template-columns: 1fr 2fr 3fr 1fr;
        /* fr means fraction of available space */
        grid-template-rows: 1fr 2fr 3fr 1fr;
        /*  */
        grid-auto-flow: column;
        grid-auto-columns: auto;
        gap: 10px;
        /* height: 1500px;
        width: 1500px; */
        background-color: lightgray;
        border: 1px solid black;
      }
      .inner-box1 {
        background-color: lightblue;
      }
      .inner-box2 {
        background-color: lightcoral;
      }
      .inner-box3 {
        background-color: lightgreen;
      }
      .inner-box4 {
        background-color: lightyellow;
      }
      .inner-box5 {
        background-color: rgb(200, 100, 170);
      }
      .inner-box6 {
        background-color: lightseagreen;
      }
      .inner-box7 {
        background-color: lightsalmon;
      }
      .inner-box8 {
        background-color: lightcyan;
      }
      .inner-box9 {
        background-color: lightgoldenrodyellow;
      }
      .inner-box10 {
        background-color: lightpink;
      }
      .inner-box11 {
        background-color: lightsteelblue;
      }
      .inner-box12 {
        background-color: lightgray;
      }
      .inner-box13 {
        background-color: lightblue;
      }
      .inner-box14 {
        background-color: lightcoral;
      }
      .inner-box15 {
        background-color: lightgreen;
      }
    </style>
  </head>
  <body>
    <div class="outer-box">
      <div class="inner-box1">
        <p>1</p>
      </div>
      <div class="inner-box2">
        <p>2</p>
      </div>
      <div class="inner-box3">
        <p>3</p>
      </div>
      <div class="inner-box4">
        <p>4</p>
      </div>
      <div class="inner-box5">
        <p>5</p>
      </div>
      <div class="inner-box6">
        <p>6</p>
      </div>
      <div class="inner-box7">
        <p>7</p>
      </div>
      <div class="inner-box8">
        <p>8</p>
      </div>
      <div class="inner-box9">
        <p>9</p>
      </div>
      <div class="inner-box10">
        <p>10</p>
      </div>
      <div class="inner-box11">
        <p>11</p>
      </div>
      <div class="inner-box12">
        <p>12</p>
      </div>
      <div class="inner-box13">
        <p>13</p>
      </div>
      <div class="inner-box14">
        <p>14</p>
      </div>
      <div class="inner-box15">
        <p>15</p>
      </div>
    </div>
  </body>
</html>
