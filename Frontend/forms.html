<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="/submit" method="post">
        <label for="fname">First Name:</label><br>
        <input type="text" id="fname" name="fname" placeholder="enter your name" maxlength="26" required><br><br>
        
        <label for="lname">Last Name:</label><br>
        <input type="text" id="lname" name="lname" placeholder="enter your last name"><br><br>
        
        usn: <input type="text" id="usn" name="usn" pattern="[0-9]{2}[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}" title="Format: 22AB12CD345" required><br><br>

        hidden input: <input type="hidden" id="token" name="token" value="1234567890abcdef"><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>
        
        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="0" max="120" step="2"><br><br>
        
        <label for="DOB">DOB</label>
        <input type="date" id="DOB" name="DOB" min="1900-01-01" max="2025-12-31"><br><br>

        <label for="week">Birthday Week:</label>
        <input type="week" id="week" name="week"><br><br>
        <label for="month">Birthday Month:</label>
        <input type="month" id="month" name="month"><br><br>

        date and time: <input type="datetime-local" id="meeting-time" name="meeting-time"><br><br>

       <label for="address"><address>Address:</address><textarea name="address" id="address"></textarea></label><br><br>

       <label for="gender">gender</label>
       <input type="radio" id="male" name="gender" value="male" checked>
       <label for="male">Male</label>
       <input type="radio" id="female" name="gender" value="female">
       <label for="female">Female</label>
       <input type="radio" id="other" name="gender" value="other">
       <label for="other">Other</label><br><br>

       hobbies:<br><br><input type="checkbox" id="hobby1" name="hobby1" value="reading" checked>
       <label for="hobby1">Reading</label><br><br>
       <input type="checkbox" id="hobby2" name="hobby2" value="traveling">
       <label for="hobby2">Traveling</label><br><br>
       <input type="checkbox" id="hobby3" name="hobby3" value="cooking">
       <label for="hobby3">Cooking</label><br><br> 
       
        <label for="country">Country:</label><br>
        <select id="country" name="country">
            <option value="usa">USA</option>
            <option value="india">India</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
        </select><br><br>

        photo: <input type="file" id="photo" name="photo" accept="image/*" multiple><br><br>

        favorite color: <input type="color" id="favcolor" name="favcolor" value="#ff0000"><br><br>

        rating: <input type="range" id="rating" name="rating" min="1" max="10"><br><br>

        reset: <input type="reset" value="Reset Form"><br><br>

        <input type="submit" value="Register">
</body>
</html>
