<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <h1>social media icons</h1>
      <p>Facebook:<i class="fa-brands fa-facebook"></i></p>
    </div>
    <div>
      <p>Twitter:<i class="fa-brands fa-twitter"></i></p>
    </div>
    <div>
      <p>Instagram:<i class="fa-brands fa-instagram"></i></p>
    </div>
    <div>
      <p>LinkedIn:<i class="fa-brands fa-linkedin"></i></p>
    </div>
    <div>
      <p>YouTube:<i class="fa-brands fa-youtube"></i></p>
    </div>
    <div>
      <p>WhatsApp:<i class="fa-brands fa-whatsapp"></i></p>
    </div>
    <!-- general icons -->
    <div>
      <p>Home:<i class="fa-solid fa-house"></i></p>
    </div>
    <div>
      <p>Search:<i class="fa-solid fa-magnifying-glass"></i></p>
    </div>
    <div>
      <p>Settings:<i class="fa-solid fa-gear"></i></p>
    </div>
    <div>
      <p>Notification:<i class="fa-solid fa-bell"></i></p>
    </div>
    <div>
      <p>Message:<i class="fa-solid fa-envelope"></i></p>
    </div>
    <div>
      <p>Profile:<i class="fa-solid fa-user"></i></p>
    </div>
    <div>
      <p>Logout:<i class="fa-solid fa-right-from-bracket"></i></p>
    </div>
    <div>
      <p>Upload:<i class="fa-solid fa-upload"></i></p>
    </div>
    like and dislike icons
    <div>
      <p>Like:<i class="fa-solid fa-thumbs-up"></i></p>
      <p>Dislike:<i class="fa-solid fa-thumbs-down"></i></p>
    </div>
    rating icons
    <div>
      <p>Star:<i class="fa-solid fa-star"></i></p>
      <p>Half Star:<i class="fa-solid fa-star-half-stroke"></i></p>
      <p>Empty Star:<i class="fa-regular fa-star"></i></p>
    </div>
    <script
      src="https://kit.fontawesome.com/f0b4477f6f.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
