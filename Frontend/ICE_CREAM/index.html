<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>IceWorld</title>
  </head>
  <body>
    <nav>
      <div class="nav__header">
        <div class="nav__logo">
          <a href="#" class="logo">Ice <span>World</span></a>
        </div>
        <div class="nav__menu__btn" id="menu-btn">
          <i class="ri-menu-3-line"></i>
        </div>
      </div>
      <ul class="nav__links" id="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#categories">Categories</a></li>
        <li><a href="#contact">Contact Us</a></li>
      </ul>
      <div class="nav__btns">
        <button class="btn"><i class="ri-shopping-cart-line"></i></button>
        <button class="btn"><i class="ri-notification-3-line"></i></button>
      </div>
    </nav>

    <header id="home">
      <div class="header__image">
        <img src="../ICE_CREAM/assets/header.png.jpeg" alt="header" />
      </div>
      <div class="header__content">
        <h1>WELCOME TO OUR <span>ICE CREAM</span> WORLD</h1>
        <p class="section__description">
          Indulge in a delightful journey of flavors! Discover creamy, delicious
          ice cream creations that will satisfy your sweet cravings. Welcome to
          a world of frozen delight!
        </p>
        <div class="header__btn">
          <button class="btn">Buy Now</button>
      </div>
      <ul class="socials">
        <li>
          <a href="#"><i class="ri-facebook-fill"></i></a>
        </li>
        <li>
          <a href="#"><i class="ri-instagram-line"></i></a>
        </li>
        <li>
          <a href="#"><i class="ri-phone-line"></i></a>
        </li>
        <li>
          <a href="#"><i class="ri-pinterest-line"></i></a>
        </li>
      </ul>
    </header>

    <script src="main.js"></script>
  </body>
</html>
