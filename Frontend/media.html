<!-- image,video,audio -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- src is a source path alt is an alternative text for accessibility -->
    <!-- pixabay or pexels for copyright free images -->
    <img
      src="https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1200&q=80"
      alt="Nature Image"
      width="600"
      height="400"
    />
    <br /><br />
    <img src="../image.png" alt="dusk" />
    <br /><br />
    <!-- video tag for embedding videos -->
    <video width="600" height="400" controls autoplay muted loop>
      <source src="../Frontend/v/6976655-uhd_2880_2160_25fps.mp4" type="video/mp4" />
    <audio src="" controls></audio>
  </body>
</html>
